<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Nexus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Animated background -->
  <div class="bg-layer">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <canvas id="particleCanvas"></canvas>
  </div>

  <!-- Grid overlay -->
  <div class="grid-overlay"></div>

  <!-- Main container -->
  <main class="container">

    <!-- Left panel -->
    <aside class="brand-panel">
      <div class="brand-logo">
        <div class="logo-mark">
          <span class="logo-diamond"></span>
        </div>
        <span class="logo-text">NEXUS</span>
      </div>
      <div class="brand-tagline">
        <h2>The future<br>starts <em>here.</em></h2>
        <p>Access your workspace, collaborate in real-time, and build what matters most.</p>
      </div>
      <div class="brand-stats">
        <div class="stat">
          <span class="stat-num" data-count="12400">0</span>
          <span class="stat-label">Active Users</span>
        </div>
        <div class="stat">
          <span class="stat-num" data-count="98">0</span><span class="stat-suffix">%</span>
          <span class="stat-label">Uptime</span>
        </div>
        <div class="stat">
          <span class="stat-num" data-count="340">0</span>
          <span class="stat-label">Integrations</span>
        </div>
      </div>
    </aside>

    <!-- Right panel: form -->
    <section class="form-panel">
      <div class="form-card" id="formCard">

        <div class="form-header">
          <h1>Welcome back</h1>
          <p>Sign in to continue your journey</p>
        </div>

        <div class="social-row">
          <button class="social-btn" id="googleBtn" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#EA4335" d="M5.26 9.77A7.03 7.03 0 0 1 12 5c1.7 0 3.24.62 4.43 1.64l3.3-3.3A11.94 11.94 0 0 0 12 0C7.39 0 3.39 2.67 1.31 6.56l3.95 3.21Z"/><path fill="#34A853" d="M16.04 18.01A7.02 7.02 0 0 1 12 19a7.03 7.03 0 0 1-6.71-4.95l-3.98 3.07A11.94 11.94 0 0 0 12 24c3.24 0 6.17-1.17 8.41-3.09l-4.37-2.9Z"/><path fill="#4A90D9" d="M20.41 20.91C22.61 18.84 24 15.83 24 12c0-.8-.1-1.62-.26-2.4H12v4.8h6.7a5.73 5.73 0 0 1-2.66 3.61l4.37 2.9Z"/><path fill="#FBBC05" d="M5.29 14.05A7.07 7.07 0 0 1 4.97 12c0-.71.1-1.4.3-2.05L1.31 6.56A11.96 11.96 0 0 0 0 12c0 1.93.46 3.75 1.27 5.37l4.02-3.32Z"/></svg>
            Continue with Google
          </button>
          <button class="social-btn github-btn" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58v-2.04c-3.34.73-4.04-1.61-4.04-1.61-.54-1.38-1.33-1.75-1.33-1.75-1.09-.74.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.5.99.11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02 0 2.04.14 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.49 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58C20.57 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12Z"/></svg>
          </button>
        </div>

        <div class="divider"><span>or sign in with email</span></div>

        <form id="loginForm" novalidate>

          <div class="field-group" id="fieldEmail">
            <label for="email">Email address</label>
            <div class="input-wrap">
              <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
              <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email">
              <div class="field-line"></div>
            </div>
            <span class="field-error" id="emailError"></span>
          </div>

          <div class="field-group" id="fieldPassword">
            <label for="password">Password</label>
            <div class="input-wrap">
              <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password">
              <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">
                <svg class="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-closed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
              <div class="field-line"></div>
            </div>
            <span class="field-error" id="passwordError"></span>
          </div>

          <div class="form-options">
            <label class="checkbox-label">
              <input type="checkbox" id="remember" name="remember">
              <span class="custom-check"></span>
              Remember me
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

          <button type="submit" class="submit-btn" id="submitBtn">
            <span class="btn-text">Sign In</span>
            <div class="btn-loader" id="btnLoader">
              <div class="loader-ring"></div>
            </div>
            <svg class="btn-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>

        </form>

        <p class="register-text">
          Don't have an account? <a href="#" class="register-link" id="registerLink">Create one free</a>
        </p>

      </div>
    </section>

  </main>

  <script src="particles.js"></script>
  <script src="app.js"></script>
</body>
</html>
